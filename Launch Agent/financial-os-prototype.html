<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoverPanda — Financial OS (Path B · Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,650&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="../journey-nav.js"></script>
<style>
  :root {
    --bg: #fbfaf8;
    --panel: #f6f4f0;
    --stone: #efece6;
    --border: #e8e4dc;
    --border-2: #ddd7cd;
    --card: #ffffff;
    --ink: #131210;
    --ink-soft: #36342f;
    --body: #4a4842;
    --muted: #6e6b63;
    --muted-2: #8a867c;
    --ember: #ff3e00;
    --ember-soft: #ffece4;
    --ember-deep: #c93100;
    --green: #00a843;
    --green-soft: #e3f6ea;
    --green-deep: #00702e;
    --blue: #0084ec;
    --blue-soft: #e6f2fd;
    --amber: #a87a08;
    --amber-soft: #faf2dd;
    --violet: #6e56e8;
    --violet-soft: #efecfd;
    --font: 'Instrument Sans', -apple-system, sans-serif;
    --display: 'Fraunces', Georgia, serif;
    --mono: 'Spline Sans Mono', ui-monospace, monospace;
    --r-card: 18px;
    --r-input: 10px;
    --inset: #efece6 0 0 0 1px inset;
    --inset-2: #e8e4dc 0 0 0 1px inset;
    --pop: 0 1px 2px rgba(19,18,16,.05), 0 8px 28px rgba(19,18,16,.09);
    --pop-lg: 0 2px 6px rgba(19,18,16,.07), 0 24px 64px rgba(19,18,16,.16);
    --spring: cubic-bezier(0.22, 1, 0.36, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); color: var(--body); background: var(--bg); -webkit-font-smoothing: antialiased; letter-spacing: -0.008em; font-size: 14px; }
  ::selection { background: #ffd9c7; }

  .ic { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; flex: none; }
  .ic--s { width: 13px; height: 13px; } .ic--l { width: 20px; height: 20px; }

  .av { display: inline-grid; place-items: center; border-radius: 50%; font-weight: 700; color: #fff; flex: none; letter-spacing: 0; }
  .av--24 { width: 24px; height: 24px; font-size: 10px; }
  .av--30 { width: 30px; height: 30px; font-size: 12px; }
  .av--38 { width: 38px; height: 38px; font-size: 14px; }

  #protobar { position: fixed; top: 0; left: 0; right: 0; height: 42px; z-index: 1200;
    background: #141312; color: #fff; display: flex; align-items: center; gap: 13px; padding: 0 14px; font-size: 12.5px;
    border-bottom: 1px solid #2a2825; }
  #protobar .pb-tag { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; font-size: 10.5px; color: #d8d4cc; }
  #protobar .pb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ember); }
  #protobar .pb-spacer { flex: 1; }
  #protobar select { background: #211f1d; color: #fff; border: 1px solid #3a3733; border-radius: 7px; padding: 5px 9px; font-family: var(--font); font-size: 12px; outline: none; cursor: pointer; max-width: 340px; }
  #protobar button { background: #fff; color: #141312; border: 0; border-radius: 7px; padding: 6px 13px; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; }
  #protobar .pb-step { color: #999590; font-family: var(--mono); font-size: 11px; }
  #protobar .pb-step b { color: #fff; font-weight: 600; }

  .stage { padding-top: 42px; min-height: 100vh; }
  .screen { display: none; }
  .screen.active { display: block; }
  .screen.active .rv { opacity: 0; transform: translateY(10px); animation: rise .5s var(--spring) forwards; }
  .screen.active .rv:nth-child(1) { animation-delay: .02s } .screen.active .rv:nth-child(2) { animation-delay: .07s }
  .screen.active .rv:nth-child(3) { animation-delay: .12s } .screen.active .rv:nth-child(4) { animation-delay: .17s }
  .screen.active .rv:nth-child(5) { animation-delay: .22s } .screen.active .rv:nth-child(6) { animation-delay: .27s }
  .screen.active .rv:nth-child(7) { animation-delay: .32s } .screen.active .rv:nth-child(8) { animation-delay: .37s }
  @keyframes rise { to { opacity: 1; transform: none; } }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    font-family: var(--font); font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em;
    border: 0; border-radius: 999px; cursor: pointer; padding: 10px 17px;
    transition: transform .1s ease, background .15s ease, box-shadow .15s ease; text-decoration: none; white-space: nowrap; }
  .btn:active { transform: scale(.98); }
  .btn--dark { background: var(--ink); color: #fff; }
  .btn--dark:hover { background: #2e2c28; }
  .btn--light { background: var(--stone); color: var(--ink); }
  .btn--light:hover { background: #e7e3da; }
  .btn--ghost { background: transparent; color: var(--ink-soft); box-shadow: var(--inset-2); }
  .btn--ghost:hover { background: var(--panel); }
  .btn--green { background: var(--green); color: #fff; }
  .btn--green:hover { background: #009039; }
  .btn--lg { padding: 13px 24px; font-size: 14.5px; }
  .btn--sm { padding: 7px 13px; font-size: 12.5px; }
  .btn--block { width: 100%; display: flex; }
  .link { color: var(--ember-deep); font-weight: 600; cursor: pointer; text-decoration: none; }
  .link:hover { text-decoration: underline; }
  .mlink { color: var(--muted); cursor: pointer; font-size: 13px; background: none; border: 0; font-family: var(--font); }
  .mlink:hover { color: var(--ink); }

  .wrap { max-width: 1040px; margin: 0 auto; padding: 44px 32px 90px; }
  .wrap--narrow { max-width: 760px; }
  h1.display { font-family: var(--display); font-weight: 500; font-size: 38px; line-height: 1.1; letter-spacing: -0.02em; color: var(--ink); }
  .sub { font-size: 15px; color: var(--muted); line-height: 1.6; margin-top: 12px; }
  .card { background: var(--card); border-radius: var(--r-card); box-shadow: var(--inset); padding: 24px; }
  .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted-2); }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ember); }
  .chip { display: inline-flex; align-items: center; gap: 7px; background: var(--card); border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); box-shadow: var(--inset-2); }
  .seclab { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted-2); }
  .mono { font-family: var(--mono); font-size: .92em; letter-spacing: 0; }

  .panda { display: flex; gap: 13px; align-items: flex-start; }
  .panda__av { flex: none; width: 36px; height: 36px; border-radius: 12px; background: var(--ink); display: grid; place-items: center; position: relative; }
  .panda__av::after { content: ""; position: absolute; right: -2px; bottom: -2px; width: 10px; height: 10px; border-radius: 50%; background: var(--green); border: 2px solid var(--bg); }
  .panda__bubble { background: var(--card); border-radius: 4px 16px 16px 16px; box-shadow: var(--inset), var(--pop); padding: 15px 18px; font-size: 14px; line-height: 1.6; color: var(--body); }
  .panda__bubble b { color: var(--ink); }
  .panda__name { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 6px; display: flex; align-items: center; gap: 7px; }
  .typing-caret { display: inline-block; width: 2px; height: 14px; background: var(--ink); margin-left: 1px; vertical-align: -2px; animation: blink .9s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .ob__top { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; }
  .logo { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; letter-spacing: -0.02em; color: var(--ink); text-decoration: none; }
  .ob__steps { display: flex; gap: 5px; align-items: center; }
  .ob__steps .st { width: 30px; height: 4px; border-radius: 99px; background: var(--stone); transition: background .3s; }
  .ob__steps .st.on { background: var(--ink); }
  .save-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .save-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .qa-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .qa-chip { display: inline-flex; align-items: center; gap: 7px; border: 0; box-shadow: var(--inset-2); background: var(--card); border-radius: 999px; padding: 9px 15px; font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; font-family: var(--font); transition: all .15s ease; }
  .qa-chip:hover { box-shadow: #b9b3a7 0 0 0 1px inset; }
  .qa-chip .ck { width: 15px; height: 15px; border-radius: 50%; display: grid; place-items: center; background: var(--stone); transition: all .15s; }
  .qa-chip .ck .ic { width: 9px; height: 9px; stroke-width: 3.4; opacity: 0; stroke: #fff; }
  .qa-chip.sel { background: var(--ink); color: #fff; box-shadow: none; }
  .qa-chip.sel .ck { background: var(--green); }
  .qa-chip.sel .ck .ic { opacity: 1; }

  .dstep { display: flex; align-items: center; gap: 13px; padding: 13px 15px; border-radius: 13px; background: var(--card); box-shadow: var(--inset-2); margin-bottom: 7px; cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .dstep:hover { box-shadow: var(--inset-2), var(--pop); transform: translateY(-1px); }
  .dstep:hover .dstep-edit { opacity: 1; }
  .dstep .n { flex: none; width: 26px; height: 26px; border-radius: 9px; background: var(--panel); display: grid; place-items: center; font-size: 11.5px; font-weight: 700; color: var(--muted); font-family: var(--mono); }
  .dstep .dmain { min-width: 0; }
  .dstep .t { font-size: 13.5px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .dstep .d { font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.45; }
  .dstep .dstep-edit { margin-left: auto; opacity: 0; transition: opacity .15s; display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--muted); flex: none; }
  .tag { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; padding: 3.5px 8px; border-radius: 99px; white-space: nowrap; flex: none; }
  .tag--auto { background: var(--violet-soft); color: var(--violet); }
  .tag--gate { background: var(--amber-soft); color: var(--amber); }
  .tag--svc  { background: var(--green-soft); color: var(--green-deep); }
  .tag--you  { background: var(--ember-soft); color: var(--ember-deep); }
  .dstep.is-new { animation: flashIn 1s var(--spring); }
  @keyframes flashIn { 0% { background: var(--amber-soft); transform: scale(.985); } 100% { background: var(--card); } }

  .phase { background: var(--card); border-radius: 15px; box-shadow: var(--inset-2); margin-bottom: 8px; overflow: hidden; }
  .phase .ph-head { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 15px 17px; }
  .phase .ph-head:hover { background: #fdfcfa; }
  .phase .ph-n { flex: none; width: 28px; height: 28px; border-radius: 9px; background: var(--panel); display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--ink-soft); font-family: var(--mono); }
  .phase .ph-t { font-size: 14px; font-weight: 600; color: var(--ink); }
  .phase .ph-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .phase .ph-week { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--muted-2); white-space: nowrap; font-family: var(--mono); background: var(--panel); padding: 4px 9px; border-radius: 7px; flex: none; }
  .phase .ph-chev { color: var(--muted-2); transition: transform .25s var(--spring); flex: none; }
  .phase.open .ph-chev { transform: rotate(90deg); }
  .phase .ph-body { display: none; padding: 2px 17px 13px 57px; }
  .phase.open .ph-body { display: block; }
  .ptask { display: flex; align-items: center; gap: 10px; padding: 7.5px 9px; font-size: 13px; color: var(--body); border-radius: 9px; cursor: pointer; }
  .ptask:hover { background: var(--panel); }
  .ptask .bx { width: 15px; height: 15px; border-radius: 5px; box-shadow: #c9c3b8 0 0 0 1.5px inset; flex: none; }
  .ptask .pt-t { min-width: 0; }
  .ptask .svc-pill { font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 99px; background: var(--green-soft); color: var(--green-deep); white-space: nowrap; flex: none; }
  .ptask .wk { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--muted-2); flex: none; }

  .bench { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 11px; margin-top: 16px; }
  .vendor { background: var(--card); border-radius: 16px; box-shadow: var(--inset); padding: 18px 19px; position: relative; transition: box-shadow .15s, opacity .25s, transform .25s; }
  .vendor:hover { box-shadow: var(--inset), var(--pop); }
  .vendor.off { opacity: .45; transform: scale(.985); }
  .vendor .v-ic { width: 36px; height: 36px; border-radius: 11px; display: grid; place-items: center; margin-bottom: 10px; }
  .vendor h3 { font-size: 14.5px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
  .vendor .v-d { font-size: 12.5px; color: var(--muted); line-height: 1.55; margin-top: 4px; }
  .vendor .v-when { font-size: 11.5px; color: var(--muted-2); margin-top: 9px; display: flex; align-items: center; gap: 6px; }
  .vendor .v-when b { color: var(--ink-soft); font-weight: 600; }
  .vendor .v-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }
  .vendor .v-live { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--green-deep); display: inline-flex; gap: 5px; align-items: center; }
  .vendor .v-live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .vendor .v-badge { position: absolute; top: 13px; right: 15px; font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--green-deep); background: var(--green-soft); padding: 3.5px 8px; border-radius: 99px; }
  .vendor .v-swap { font-size: 11.5px; color: var(--muted); cursor: pointer; background: none; border: 0; font-family: var(--font); }
  .vendor .v-swap:hover { color: var(--ink); text-decoration: underline; }

  .app { display: flex; min-height: calc(100vh - 42px); }
  .app__side { width: 222px; flex: none; background: var(--panel); border-right: 1px solid var(--border); padding: 14px 11px 12px; display: flex; flex-direction: column; }
  @media (max-width: 860px) { .app__side { display: none; } }
  .ws-switch { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 10px; background: var(--card); box-shadow: var(--inset-2); margin-bottom: 7px; cursor: pointer; }
  .ws-switch .wsq { width: 24px; height: 24px; border-radius: 7px; background: linear-gradient(135deg, #1fae54, #0b7a37); color: #fff; display: grid; place-items: center; font-size: 11px; font-weight: 800; }
  .ws-switch .nm { font-size: 12.5px; font-weight: 600; color: var(--ink); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .srch { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 9px; color: var(--muted-2); font-size: 12.5px; cursor: pointer; margin-bottom: 6px; }
  .srch:hover { background: #edeae3; }
  .srch .kbd { margin-left: auto; font-family: var(--mono); font-size: 10px; background: var(--card); box-shadow: var(--inset-2); border-radius: 5px; padding: 2px 5px; color: var(--muted); }
  .snav { list-style: none; }
  .snav .lab { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted-2); padding: 13px 9px 5px; }
  .snav a { display: flex; align-items: center; gap: 9px; padding: 6.5px 9px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--body); text-decoration: none; cursor: pointer; }
  .snav a:hover { background: #edeae3; }
  .snav a.on { background: #e9e5dd; color: var(--ink); font-weight: 600; }
  .snav a .ic { color: var(--muted); }
  .snav a.on .ic { color: var(--ink); }
  .snav .badge { margin-left: auto; background: var(--ember); color: #fff; font-size: 10px; font-weight: 700; border-radius: 99px; padding: 1.5px 6.5px; font-family: var(--mono); }
  .side-foot { margin-top: auto; display: flex; align-items: center; gap: 9px; padding: 10px 9px 2px; border-top: 1px solid var(--border); }
  .side-foot .nm { font-size: 12px; font-weight: 600; color: var(--ink-soft); }
  .side-foot .em { font-size: 10.5px; color: var(--muted-2); }
  .app__main { flex: 1; padding: 26px 34px 80px; max-width: 1180px; min-width: 0; }
  .main-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .main-head h1 { font-family: var(--display); font-weight: 500; font-size: 25px; letter-spacing: -0.01em; color: var(--ink); }
  .main-head .sub { margin-top: 4px; font-size: 13.5px; }
  .agent-status { display: inline-flex; align-items: center; gap: 8px; background: var(--card); border-radius: 999px; padding: 8px 14px; box-shadow: var(--inset); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
  .agent-status .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,168,67,.35); } 50% { box-shadow: 0 0 0 6px rgba(0,168,67,0); } }

  .grid2 { display: grid; grid-template-columns: minmax(0,1fr) 330px; gap: 16px; align-items: start; }
  @media (max-width: 1020px) { .grid2 { grid-template-columns: 1fr; } }

  .mrow { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; margin-bottom: 18px; }
  @media (max-width: 1020px) { .mrow { grid-template-columns: 1fr 1fr; } }
  .met { background: var(--card); border-radius: 14px; box-shadow: var(--inset); padding: 14px 16px; position: relative; overflow: hidden; }
  .met .m-l { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted-2); }
  .met .m-v { font-family: var(--display); font-size: 25px; font-weight: 500; color: var(--ink); margin-top: 6px; }
  .met .m-v small { font-size: 13px; font-family: var(--font); color: var(--muted); font-weight: 500; }
  .met .m-d { font-size: 11.5px; font-weight: 600; color: var(--green-deep); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
  .met .m-d.neutral { color: var(--muted); }
  .met .spark { position: absolute; right: 12px; top: 16px; opacity: .9; }

  .appr { background: var(--card); border-radius: 15px; box-shadow: var(--inset); padding: 16px 18px; margin-bottom: 10px; transition: all .35s var(--spring); position: relative; }
  .appr .a-head { display: flex; align-items: center; gap: 11px; }
  .appr .a-ic { width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center; flex: none; }
  .appr .a-t { font-size: 14px; font-weight: 650; color: var(--ink); }
  .appr .a-who { font-size: 12px; color: var(--muted); margin-top: 1px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .appr .a-body { font-size: 13px; color: var(--body); line-height: 1.55; margin: 11px 0 12px; padding: 11px 13px; background: var(--panel); border-radius: 11px; }
  .appr .a-body b { color: var(--ink); }
  .appr .a-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .appr .a-gate { margin-left: auto; font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--amber); background: var(--amber-soft); padding: 4px 9px; border-radius: 99px; white-space: nowrap; flex: none; }
  .appr.resolved { opacity: .55; }
  .appr.resolved .a-body { display: none; }
  .appr.held { box-shadow: var(--amber) 0 0 0 1.5px inset; }

  .feed { background: var(--card); border-radius: 15px; box-shadow: var(--inset); padding: 16px 18px; }
  .feed h3 { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .fd { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f2ec; }
  .fd:last-child { border-bottom: 0; }
  .fd .fd-ic { flex: none; width: 26px; height: 26px; border-radius: 8px; background: var(--panel); display: grid; place-items: center; color: var(--muted); }
  .fd .fd-tx { font-size: 12.5px; line-height: 1.5; color: var(--body); }
  .fd .fd-tx b { color: var(--ink); font-weight: 600; }
  .fd .fd-tm { font-size: 10.5px; color: var(--muted-2); margin-top: 2px; font-family: var(--mono); }

function money(n){ return '$' + Math.round(n).toLocaleString('en-US'); }
function renderNetwork() {
  const U = STATE.netUnits;
  // before QuickBooks is connected, the whole network reads as "ready / pending"
  const live = STATE.connected;
  const syncedRev = live ? U.filter(u=>u.s==='synced').reduce((a,u)=>a+u.r,0) : 0;
  const nudgedRev = (live && STATE.idleNudged) ? U.filter(u=>u.s==='idle').reduce((a,u)=>a+u.r,0) : 0;
  const sysRev = syncedRev + nudgedRev;
  const onlineCount = !live ? 0 : U.filter(u=>u.s==='synced').length + (STATE.idleNudged ? U.filter(u=>u.s==='idle').length : 0);
  const pct = Math.round(onlineCount / U.length * 100);
  const idleLeft = U.filter(u=>u.s==='idle').length;

  const nodes = U.map(u=>{
    // visible status: arriving always shows arriving; synced/idle light only after connect (+nudge)
    let st = 'pending';
    if (u.s==='arriving') st = 'arriving';
    else if (live && u.s==='synced') st = 'on';
    else if (live && u.s==='idle' && STATE.idleNudged) st = 'on';
    else if (live && u.s==='idle') st = 'idle';
    const c = st==='on' ? 'var(--green)' : st==='arriving' ? 'var(--amber)' : 'var(--border-2)';
    const cs = st==='on' ? 'var(--green-soft)' : st==='arriving' ? 'var(--amber-soft)' : 'var(--panel)';
    const col = st==='on' ? 'var(--green-deep)' : st==='arriving' ? 'var(--amber)' : 'var(--muted-2)';
    const ring = st==='on' ? `box-shadow:0 0 0 1.5px ${c} inset` : st==='arriving' ? `box-shadow:0 0 0 1.5px ${c} inset` : 'box-shadow:var(--inset-2); border:1.2px dashed var(--border-2)';
    const dot = st==='on' ? `<span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span>`
      : st==='arriving' ? `<span style="width:6px;height:6px;border-radius:50%;background:var(--amber)"></span>`
      : `<span style="width:6px;height:6px;border-radius:50%;background:var(--border-2)"></span>`;
    const title = st==='arriving' ? 'Joining via Launch Agent' : st==='on' ? 'Syncing · '+money(u.r) : st==='idle' ? 'Awaiting connect' : 'Ready to sync';
    return `<div title="${u.n} — ${title}" style="background:var(--card);border-radius:11px;padding:9px 10px;${ring};min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <span style="width:24px;height:24px;border-radius:7px;background:${cs};color:${col};display:grid;place-items:center;font-size:9.5px;font-weight:700;font-family:var(--display)">${u.i}</span>
        ${dot}
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--ink);margin-top:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u.n}</div>
      <div style="font-size:9.5px;color:${st==='on'?'var(--green-deep)':col};margin-top:1px;font-weight:${st==='on'||st==='arriving'?'600':'400'}">${st==='on'?money(u.r):st==='arriving'?'Aug 21 →':st==='idle'?'idle':'ready'}</div>
    </div>`;
  }).join('');

  const headline = !live
    ? `<div style="font-family:var(--display);font-size:25px;color:var(--muted-2)">Connect to bring your network online</div><div style="font-size:12px;color:var(--muted);margin-top:2px">21 units waiting · authorize QuickBooks below to start the roll-up</div>`
    : `<div style="font-family:var(--display);font-size:28px;color:var(--ink);line-height:1">${money(sysRev)}<span style="font-size:13px;color:var(--muted);font-weight:400;font-family:var(--font)"> system revenue · monthly</span></div>
       <div style="font-size:12px;color:var(--muted);margin-top:3px"><b style="color:var(--green-deep)">${onlineCount} of ${U.length}</b> units online${idleLeft&&!STATE.idleNudged?` · ${idleLeft} idle, books not yet connected`:''}${STATE.idleNudged?' · 1 arriving from your Launch Agent':''}</div>`;

  const action = !live ? ''
    : (!STATE.idleNudged && idleLeft
      ? `<button class="btn btn--dark btn--sm" onclick="nudgeIdle()">${ic('i-bank','ic--s')} Nudge ${idleLeft} idle units to connect</button>`
      : `<span style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--amber);font-weight:600">${ic('i-clock','ic--s')} SLC #1 arrives automatically when its doors open</span>`);

  const bar = live ? `<div style="height:6px;border-radius:99px;background:var(--panel);overflow:hidden;margin:13px 0 3px"><div style="height:100%;width:${pct}%;background:var(--green);border-radius:99px;transition:width .6s cubic-bezier(.22,1,.36,1)"></div></div>` : '';

  return `<div class="card rv" style="margin-top:20px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap">
      <div><div class="seclab" style="margin-bottom:7px">Your network — coming online</div>${headline}</div>
      ${action}
    </div>
    ${bar}
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:13px">${nodes}</div>
    <div style="font-size:11px;color:var(--muted);line-height:1.5;margin-top:13px;display:flex;gap:7px"><span style="color:var(--green)">${ic('i-link','ic--s')}</span> <span>Every unit that connects its books lights up here and folds into your consolidated P&amp;L. <b>The Launch Agent feeds new units straight in</b> — SLC #1 joins the day Dana Park opens, no setup on your side.</span></div>
  </div>`;
}

/* ====================== ENGINE ====================== */
const SCREENS = [
  { name:'0 · Upgrade — unlock the Financial OS', render: rUpgrade },
  { name:'1 · Connect your books (QuickBooks)', render: rConnect },
  { name:'2 · Consolidated P&L + narrative signals', render: rPnl },
  { name:'3 · The consolidated report (by unit)', render: rReport },
  { name:'4 · Agentic CFO reporting', render: rGenerate },
  { name:'5 · Operating cadence + pricing', render: rCadence },
];
let cur = 0;
function buildStage(){
  $id('stageRoot').innerHTML = SCREENS.map((s,i)=>`<section class="screen ${i===cur?'active':''}" data-idx="${i}">${s.render()}</section>`).join('');
  const j=$id('pbJump'); j.innerHTML = SCREENS.map((s,i)=>`<option value="${i}" ${i===cur?'selected':''}>${s.name}</option>`).join('');
  $id('pbStep').innerHTML = `<b>${cur+1}</b>/${SCREENS.length}`;
}
function rerender(){ const sec=$id('stageRoot').querySelector(`.screen[data-idx="${cur}"]`); if(sec) sec.innerHTML=SCREENS[cur].render(); }
function go(n){ if(n<0||n>=SCREENS.length) return; cur=n; closeAll(); buildStage(); window.scrollTo(0,0); }
function next(){ go(Math.min(cur+1, SCREENS.length-1)); }
document.addEventListener('keydown', e=>{ if(e.target.matches('input,textarea,select')) return; if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')go(Math.max(cur-1,0)); if(e.key==='Escape')closeAll(); });
buildStage();
</script>
