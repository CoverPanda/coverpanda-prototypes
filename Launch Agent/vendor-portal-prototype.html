<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoverPanda — Vendor Marketplace Portal (Hatch CPA Group)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="../journey-nav.js"></script>
<style>
  :root{
    --bg:#fbfaf8;--panel:#f6f4f0;--stone:#efece6;--border:#e8e4dc;--border2:#ddd7cd;--card:#fff;
    --ink:#131210;--ink-soft:#36342f;--body:#4a4842;--muted:#6e6b63;--muted2:#8a867c;
    --ember:#ff3e00;--ember-soft:#ffece4;--ember-deep:#c93100;--green:#00a843;--green-soft:#e3f6ea;--green-deep:#00702e;
    --blue:#0084ec;--blue-soft:#e6f2fd;--violet:#6e56e8;--violet-soft:#efecfd;--amber:#a87a08;--amber-soft:#faf2dd;
    --font:'Instrument Sans',-apple-system,sans-serif;--display:'Fraunces',Georgia,serif;--mono:'Spline Sans Mono',ui-monospace,monospace;
    --inset:#efece6 0 0 0 1px inset;--inset2:#e8e4dc 0 0 0 1px inset;--pop:0 1px 2px rgba(19,18,16,.05),0 12px 34px rgba(19,18,16,.12);--pop-lg:0 2px 6px rgba(19,18,16,.07),0 24px 64px rgba(19,18,16,.16);
    --spring:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--body);-webkit-font-smoothing:antialiased;letter-spacing:-.008em;font-size:14px;min-height:100vh}
  .ic{width:16px;height:16px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .ic--s{width:13px;height:13px}.ic--l{width:20px;height:20px}

  #bar{position:fixed;top:0;left:0;right:0;height:46px;z-index:200;background:#141312;color:#fff;display:flex;align-items:center;gap:13px;padding:0 16px;font-size:12.5px;border-bottom:1px solid #2a2825}
  #bar .tag{display:inline-flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:10.5px;color:#d8d4cc}
  #bar .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  #bar .sp{flex:1}
  #bar .step{font-family:var(--mono);font-size:11.5px;color:#c9c5bd}
  #bar select{background:#222019;color:#fff;border:1px solid #38352f;border-radius:8px;padding:6px 10px;font-family:var(--font);font-size:12px;max-width:300px}
  #bar button{background:#fff;color:#141312;border:0;border-radius:8px;padding:7px 14px;font-family:var(--font);font-size:12.5px;font-weight:600;cursor:pointer}

  .stage{padding-top:46px;min-height:100vh}
  .screen{display:none}.screen.active{display:block;animation:fade .3s var(--spring)}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* full-bleed (invite, go-live) */
  .wrap{max-width:1080px;margin:0 auto;padding:24px 26px 90px}
  .wrap--narrow{max-width:680px}

  /* wizard layout: rail + main */
  .wiz{display:grid;grid-template-columns:264px 1fr;gap:0;max-width:1140px;margin:0 auto;min-height:calc(100vh - 46px)}
  @media (max-width:900px){.wiz{grid-template-columns:1fr}.rail{display:none}}
  .rail{border-right:1px solid var(--border);background:var(--panel);padding:24px 18px}
  .rail .rbrand{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--ink);font-size:14px;margin-bottom:6px}
  .rail .rsub{font-size:11px;color:var(--muted2);margin-bottom:18px}
  .rail .prog{height:5px;border-radius:99px;background:var(--stone);overflow:hidden;margin-bottom:6px}
  .rail .prog>div{height:100%;background:var(--green);border-radius:99px;transition:width .5s var(--spring)}
  .rail .pct{font-size:11px;color:var(--muted);margin-bottom:18px}
  .rstep{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .14s;margin-bottom:2px}
  .rstep:hover{background:var(--stone)}
  .rstep.on{background:var(--card);box-shadow:var(--inset2)}
  .rstep .rn{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;flex:none;background:var(--stone);color:var(--muted)}
  .rstep.on .rn{background:var(--ink);color:#fff}
  .rstep.done .rn{background:var(--green);color:#fff}
  .rstep .rl{font-size:13px;font-weight:600;color:var(--ink-soft)}
  .rstep.on .rl{color:var(--ink)}
  .main{padding:30px 40px 90px;max-width:760px}
  @media (max-width:900px){.main{padding:24px 22px 80px}}

  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted2)}
  .eyebrow .d{width:6px;height:6px;border-radius:50%;background:var(--green)}
  h1.display{font-family:var(--display);font-weight:500;letter-spacing:-.02em;color:var(--ink);font-size:30px;line-height:1.08}
  h2.mt{font-family:var(--display);font-weight:550;font-size:19px;color:var(--ink)}
  .sub{font-size:14px;color:var(--muted);line-height:1.55}
  .perspbar{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-soft);background:var(--card);box-shadow:var(--inset2);border-radius:99px;padding:6px 13px}
  .perspbar b{color:var(--ink)}

  .card{background:var(--card);border-radius:16px;box-shadow:var(--inset2);padding:20px}
  .seclab{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2)}
  .tick{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;color:var(--body);padding:5px 0;line-height:1.5}
  .tick .ic{color:var(--green);margin-top:2px}
  .panda{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px}
  .panda .av{flex:none;width:34px;height:34px;border-radius:11px;background:var(--ink);display:grid;place-items:center;position:relative}
  .panda .av::after{content:"";position:absolute;right:-2px;bottom:-2px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg)}
  .panda .name{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);display:flex;align-items:center;gap:6px}
  .panda .bub{background:var(--card);border-radius:4px 13px 13px 13px;box-shadow:var(--inset2);padding:12px 14px;font-size:13px;line-height:1.5;color:var(--body);margin-top:6px}
  .panda .bub b{color:var(--ink)}

  .field{margin-bottom:15px}
  .field label{display:block;font-size:12.5px;font-weight:650;margin-bottom:6px;color:var(--ink-soft)}
  .field .hintt{font-size:11.5px;color:var(--muted2);margin-top:5px}
  .input,.ta{width:100%;font-family:var(--font);font-size:13.5px;color:var(--ink);background:var(--card);border:0;box-shadow:var(--inset2);border-radius:10px;padding:10px 12px;outline:none}
  .ta{min-height:74px;line-height:1.5;resize:none}
  .input:focus,.ta:focus{box-shadow:var(--ink-soft) 0 0 0 1.5px inset}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}

  /* selectable chips / cards */
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--card);box-shadow:var(--inset2);border-radius:99px;padding:7px 13px;cursor:pointer;transition:all .14s}
  .chip.on{background:var(--ink);color:#fff;box-shadow:none}
  .chip .ic{width:13px;height:13px}
  .selcard{border-radius:13px;box-shadow:var(--inset2);background:var(--card);padding:14px 15px;cursor:pointer;transition:all .14s}
  .selcard:hover{box-shadow:var(--inset2),0 6px 14px -8px rgba(19,18,16,.22)}
  .selcard.on{box-shadow:0 0 0 1.6px var(--ink) inset}
  .selcard .sct{font-size:13.5px;font-weight:700;color:var(--ink)}
  .selcard .scd{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45}

  /* toggle */
  .tg{position:relative;width:40px;height:23px;border-radius:99px;background:var(--border2);cursor:pointer;transition:background .18s;flex:none}
  .tg.on{background:var(--green)}
  .tg::after{content:"";position:absolute;top:2.5px;left:2.5px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .18s var(--spring);box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .tg.on::after{transform:translateX(17px)}
  .togrow{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid #f4f1ec}
  .togrow:last-child{border-bottom:0}
  .togrow .tt{font-size:13.5px;font-weight:600;color:var(--ink)}
  .togrow .td{font-size:11.5px;color:var(--muted);margin-top:1px}

  /* color swatches */
  .swatches{display:flex;gap:9px}
  .sw{width:32px;height:32px;border-radius:9px;cursor:pointer;position:relative;transition:transform .12s}
  .sw:hover{transform:scale(1.08)}
  .sw.on{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--ink)}

  /* package cards */
  .pkg{display:flex;gap:13px;align-items:flex-start;background:var(--card);border-radius:13px;box-shadow:var(--inset2);padding:14px 15px;margin-bottom:10px}
  .pkg .pi{width:30px;height:30px;border-radius:9px;background:var(--green-soft);color:var(--green-deep);display:grid;place-items:center;flex:none}
  .pkg .pn{font-size:13.5px;font-weight:700;color:var(--ink)}
  .pkg .pd{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
  .pkg .pp{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--ink);font-weight:500;white-space:nowrap}
  .addbtn{display:flex;align-items:center;gap:9px;padding:12px 14px;border-radius:12px;border:1.4px dashed var(--border2);cursor:pointer;color:var(--muted);font-size:12.5px;font-weight:600}
  .addbtn:hover{border-color:var(--ink-soft);color:var(--ink-soft);background:var(--panel)}

  /* proposal designer */
  .designer{display:grid;grid-template-columns:240px 1fr;gap:18px}
  @media (max-width:760px){.designer{grid-template-columns:1fr}}
  .secitem{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:10px;box-shadow:var(--inset2);background:var(--card);margin-bottom:7px;cursor:pointer}
  .secitem .grip{color:var(--muted2);font-size:13px}
  .secitem .sl{font-size:12.5px;font-weight:600;color:var(--ink);flex:1}
  .secitem.off{opacity:.5}
  .preview{background:var(--card);border-radius:14px;box-shadow:var(--inset2),0 14px 34px -18px rgba(19,18,16,.3);overflow:hidden;font-size:11px}
  .pv-cover{padding:24px;color:#fff}
  .pv-sec{padding:15px 20px;border-bottom:1px solid #f4f1ec}
  .pv-sec:last-child{border-bottom:0}
  .pv-h{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px}
  .pv-line{height:6px;border-radius:3px;background:var(--stone);margin-top:5px}
  .pv-row{display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0;color:var(--body)}
  .pv-sigbox{margin-top:8px;border:1.4px dashed var(--border2);border-radius:8px;padding:13px;text-align:center;font-family:var(--display);font-style:italic;color:var(--muted2);font-size:13px}

  /* payments */
  .bankbox{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:13px;box-shadow:var(--inset2);padding:15px 16px}
  .bankbox.connected{box-shadow:0 0 0 1.5px var(--green) inset}
  .bankbox .bi{width:38px;height:38px;border-radius:10px;background:var(--panel);color:var(--muted);display:grid;place-items:center;flex:none}
  .bankbox.connected .bi{background:var(--green-soft);color:var(--green-deep)}
  .radcard{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;border-radius:12px;box-shadow:var(--inset2);background:var(--card);cursor:pointer;transition:all .14s}
  .radcard.on{box-shadow:0 0 0 1.6px var(--ink) inset}
  .radcard .rad{width:18px;height:18px;border-radius:50%;border:1.6px solid var(--border2);flex:none;margin-top:1px;display:grid;place-items:center}
  .radcard.on .rad{border-color:var(--ink)}
  .radcard.on .rad::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--ink)}
  .radcard .rt{font-size:13px;font-weight:700;color:var(--ink)}
  .radcard .rd{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}

  /* lead inbox + dashboard */
  .dashtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:0;padding:0 26px;max-width:1080px;margin:0 auto}
  .dashtabs button{background:none;border:0;font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);padding:13px 14px;cursor:pointer;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:7px}
  .dashtabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
  .lead{display:flex;gap:14px;align-items:flex-start;background:var(--card);border-radius:14px;box-shadow:var(--inset2);padding:16px 17px}
  .lead.new{box-shadow:0 0 0 1.5px var(--green) inset}
  .lead .av{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:16px;color:#fff;flex:none}
  .lead .lt{font-size:14.5px;font-weight:700;color:var(--ink)}
  .lead .ld{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.45}
  .qual{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .qchip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--ink-soft);background:var(--panel);border-radius:99px;padding:4px 9px}
  .qchip .ic{width:12px;height:12px;color:var(--green)}
  .vbadge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;border-radius:99px;padding:3px 10px}
  .vbadge.green{color:var(--green-deep);background:var(--green-soft)}
  .vbadge.violet{color:var(--violet);background:var(--violet-soft)}
  .stat{background:var(--card);border-radius:14px;box-shadow:var(--inset2);padding:15px 17px}
  .stat .sv{font-family:var(--display);font-size:24px;color:var(--ink);line-height:1}
  .stat .sl{font-size:11.5px;color:var(--muted);margin-top:4px}
  .prop{background:var(--card);border-radius:14px;box-shadow:var(--inset2);overflow:hidden}
  .prop .ph{padding:13px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
  .prop .ph b{color:var(--ink-soft)}
  .prefill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--violet);background:var(--violet-soft);border-radius:99px;padding:4px 10px}
  .lineitem{display:flex;justify-content:space-between;font-size:13.5px;padding:9px 16px;border-bottom:1px solid #f4f1ec}
  .lineitem:last-child{border-bottom:0}.lineitem b{color:var(--ink)}
  .donecheck{width:56px;height:56px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;margin:0 auto}
  .tier{background:var(--card);border-radius:16px;box-shadow:var(--inset2);padding:18px}
  .tier.pro{box-shadow:var(--ink) 0 0 0 2px inset}
  .pr{font-family:var(--display);font-size:24px;color:var(--ink)}
  .pr span{font-size:13px;color:var(--muted);font-family:var(--font)}
  .note{font-size:12px;color:var(--muted);line-height:1.55;background:var(--panel);border-radius:12px;padding:12px 14px}
  .note b{color:var(--ink-soft)}
  .hint{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--muted);line-height:1.55;background:var(--card);box-shadow:var(--inset2);border-radius:12px;padding:13px 15px}
  .hint .ic{color:var(--violet);flex:none;margin-top:1px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:var(--font);font-size:13.5px;font-weight:600;border:0;border-radius:999px;cursor:pointer;padding:11px 18px;transition:transform .1s,background .15s;text-decoration:none}
  .btn:active{transform:scale(.99)}
  .btn--dark{background:var(--ink);color:#fff}.btn--dark:hover{background:#2e2c28}
  .btn--green{background:var(--green);color:#fff}.btn--green:hover{background:#009039}
  .btn--ghost{background:transparent;color:var(--ink-soft);box-shadow:var(--inset2)}.btn--ghost:hover{background:var(--panel)}
  .btn--lg{padding:13px 22px;font-size:14.5px}
  .mlink{color:var(--muted);cursor:pointer;font-size:12.5px;background:none;border:0;font-family:var(--font)}.mlink:hover{color:var(--ink)}
  .navbtns{display:flex;gap:12px;align-items:center;margin-top:26px}

  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(90px);z-index:400;background:var(--ink);color:#fff;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:11px;box-shadow:var(--pop-lg);transition:transform .35s var(--spring);max-width:92vw}
  #toast.on{transform:translateX(-50%) translateY(0)}
  #toast .ic{color:#7ee2a4}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-panda" viewBox="0 0 26 26"><circle cx="9.7" cy="13.3" r="1.5" fill="#fff" stroke="none"/><circle cx="16.3" cy="13.3" r="1.5" fill="#fff" stroke="none"/><path d="M10.5 17.2c.9 1 3.1 1 4 0" stroke="#fff" stroke-width="1.4" fill="none"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
  <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
  <symbol id="i-spark" viewBox="0 0 24 24"><path d="M12 2l1.9 5.7L20 9.6l-5.6 2.3L12 18l-2.4-6.1L4 9.6l6.1-1.9z"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 15v-4M12 17V8M17 13v-3"/></symbol>
  <symbol id="i-card" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></symbol>
  <symbol id="i-bank" viewBox="0 0 24 24"><path d="m3 9 9-6 9 6"/><path d="M4 9v11M20 9v11M8 12v5M12 12v5M16 12v5"/><path d="M2 20h20"/></symbol>
  <symbol id="i-inbox" viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.5z"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 22s8-3.5 8-10V5l-8-3-8 3v7c0 6.5 8 10 8 10z"/></symbol>
  <symbol id="i-store" viewBox="0 0 24 24"><path d="M3 9l1.5-5h15L21 9M4 9v11h16V9M4 9h16M9 20v-6h6v6"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></symbol>
  <symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="i-cal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></symbol>
  <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="i-star" viewBox="0 0 24 24"><path d="M12 2l3 6.5 7 .9-5 4.8 1.3 7L12 18l-6.3 3.2L7 14.2 2 9.4l7-.9z"/></symbol>

<script>
const $id=s=>document.getElementById(s);
function ic(id,c){ return `<svg class="ic ${c||''}"><use href="#${id}"/></svg>`; }
function toast(msg){ const t=$id('toast'); t.innerHTML=ic('i-check')+`<span>${msg}</span>`; t.classList.add('on'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('on'),3600); }

/* ---------- state ---------- */
const STATE = {
  accepted:false, live:false,
  brandColor:'#3a3550',
  creds:{cpa:true, qb:true, irs:false},
  pkgs:[
    {name:'Monthly bookkeeping & reconciliation', d:'Categorization, reconciliation, monthly close', price:'$240/mo', on:true},
    {name:'Royalty-ready P&L (brand template)', d:'Mapped to the brand chart of accounts', price:'included', on:true},

  sections:[
    {id:'cover', l:'Cover page', on:true},
    {id:'about', l:'About Hatch CPA', on:true},
    {id:'scope', l:'Scope of work', on:true},
    {id:'pricing', l:'Pricing table', on:true},
    {id:'payterms', l:'Payment schedule', on:true},
    {id:'terms', l:'Terms & policies', on:true},
    {id:'sign', l:'E-signature', on:true},
  ],
  contract:{tpl:'standard', esign:true, autoRenew:true},
  pay:{bank:false, ach:true, card:true, deposit:'standard', schedule:'deposit'},
  leads:{bright:true, rally:true, savory:false, autoAck:true},
  // completion flags per step (1..7)
  done:{1:false,2:false,3:false,4:false,5:false,6:false,7:false},
};
function markDone(step){ STATE.done[step]=true; }

const STEPS=['Business basics','Brand profile','Services & packages','Proposal template','Service agreement','Payments','Lead preferences','Review & go live'];

/* ---------- chrome ---------- */
function rail(active){
  const doneCount=Object.values(STATE.done).filter(Boolean).length;
  const pct=Math.round(doneCount/7*100);
  const items=STEPS.map((s,i)=>{
    const step=i+1;
    const isDone = step<=7 ? STATE.done[step] : (STATE.live);
    const cls=(active===step?'on ':'')+(isDone?'done':'');
    const num=isDone?'✓':step;
    return `<div class="rstep ${cls}" onclick="go(${step})"><span class="rn">${num}</span><span class="rl">${s}</span></div>`;
  }).join('');
  return `<aside class="rail">
    <div class="rbrand"><svg width="20" height="20" viewBox="0 0 26 26"><rect width="26" height="26" rx="7" fill="#131210"/><use href="#i-panda"/></svg> coverpanda</div>
    <div class="rsub">Vendor setup · Hatch CPA Group</div>
    <div class="prog"><div style="width:${pct}%"></div></div>
    <div class="pct">${doneCount} of 7 steps set up</div>
    ${items}
  </aside>`;
}
function wiz(active, main){ return `<div class="wiz">${rail(active)}<main class="main">${main}</main></div>`; }
function navBtns(label){ return `<div class="navbtns"><button class="btn btn--dark btn--lg" onclick="next()">${label||'Save & continue'} ${ic('i-arrow','ic--s')}</button>${active1Back()}</div>`; }
function active1Back(){ return cur>1 ? `<button class="mlink" onclick="go(cur-1)">Back</button>` : ''; }

function dashTabs(active){
  const t=[['inbox','i-inbox','Leads',9],['proposals','i-doc','Proposals',10],['payments','i-bank','Payments',11],['profile','i-user','Profile',1]];
  return `<div class="dashtabs">${t.map(([k,icn,l,scr])=>`<button class="${active===k?'on':''}" onclick="go(${scr})">${ic(icn,'ic--s')} ${l}</button>`).join('')}</div>`;
}

/* ---------- engine ---------- */
const SCREENS=[
  {name:'0 · The warm invite', render:rInvite},
  {name:'1 · Business basics', render:rBasics},
  {name:'2 · Brand profile', render:rBrand},
  {name:'3 · Services & packages', render:rPackages},
  {name:'4 · Proposal designer', render:rProposal},
  {name:'5 · Service agreement', render:rContract},
  {name:'6 · Payments & payouts', render:rPayments},
  {name:'7 · Lead preferences', render:rLeads},
  {name:'8 · Review & go live', render:rGoLive},
  {name:'9 · Lead inbox (live)', render:rInbox},
  {name:'10 · Respond — proposal', render:rRespond},
  {name:'11 · Signed, paid & economics', render:rPaid},
];
let cur=0;
// mark a wizard step done when you advance past it
function markStepFromAdvance(from){ if(from>=1&&from<=7) STATE.done[from]=true; }
function buildStage(){
  $id('stageRoot').innerHTML = SCREENS.map((s,i)=>`<section class="screen ${i===cur?'active':''}" data-idx="${i}">${i===cur?s.render():''}</section>`).join('');
  $id('pbJump').innerHTML = SCREENS.map((s,i)=>`<option value="${i}" ${i===cur?'selected':''}>${s.name}</option>`).join('');
  $id('pbStep').innerHTML = `${cur+1} / ${SCREENS.length}`;
  window.scrollTo(0,0);
}
function rerender(){ const sec=$id('stageRoot').querySelector(`.screen[data-idx="${cur}"]`); if(sec) sec.innerHTML=SCREENS[cur].render(); }
function go(n){ if(n<0||n>=SCREENS.length) return; cur=n; buildStage(); }
function next(){ markStepFromAdvance(cur); go(Math.min(cur+1,SCREENS.length-1)); }
buildStage();
</script>
